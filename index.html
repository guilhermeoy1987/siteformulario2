<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Emprego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
        <div class="container d-flex flex-wrap justify-content-center align-items-center gap-5">
            
            <!-- Formulário -->
            <div class="form-box p-4 rounded shadow bg-white" style="max-width: 500px; flex: 1;">
                <h2 class="mb-3 text-primary">Cadastre-se para uma Oportunidade de Emprego</h2>
                <p class="mb-4">Preencha seus dados e receba oportunidades incríveis!</p>

                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Seu nome completo">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Seu e-mail">
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Seu telefone">
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="check">
                        <label class="form-check-label" for="check">
                            Aceito receber promoções por e-mail
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar Cadastro</button>
                </form>
            </div>

            <!-- Imagem -->
            <div class="image-box">
                <img src="imagem/rh2.jpg" alt="RH" class="img-fluid rounded shadow">
            </div>
        </div>
    </div>

    <footer class="text-center mt-5">
        <p>© 2025 Cadastro de Empregos. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
